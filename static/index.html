<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Playlist Generator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" class="spotify-icon" aria-hidden="true">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>AI Playlist Generator</span>
      </div>
      <p class="subtitle">Describe a mood — Claude picks the songs, Spotify saves the playlist.</p>
    </header>

    <!-- LOGGED OUT STATE -->
    <section id="section-logged-out" class="hidden">
      <button id="btn-login" class="btn btn-spotify">
        Login with Spotify
      </button>
    </section>

    <!-- LOGGED IN STATE -->
    <section id="section-logged-in" class="hidden">
      <p class="welcome" id="welcome-text"></p>

      <div class="form-group">
        <label for="prompt-input">Describe your playlist</label>
        <textarea
          id="prompt-input"
          rows="3"
          placeholder="e.g. upbeat 80s workout bangers, late night lo-fi study vibes, summer road trip indie rock..."
        ></textarea>
        <p class="error-msg hidden" id="prompt-error">Please enter a prompt first.</p>
      </div>

      <div class="slider-group">
        <label for="song-count">Songs: <span id="song-count-label">15</span></label>
        <input type="range" id="song-count" min="10" max="30" step="5" value="15" />
      </div>

      <button id="btn-generate" class="btn btn-spotify">
        Generate Playlist
      </button>

      <!-- LOADING STATE -->
      <div id="section-loading" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loading-text">Claude is picking songs&hellip;</p>
      </div>

      <!-- PREVIEW STATE -->
      <div id="section-preview" class="hidden preview-card">
        <p class="result-label">Claude's picks — looking good?</p>
        <ol id="preview-list" class="song-list"></ol>
        <div class="playlist-name-group">
          <label for="playlist-name-input">Playlist name</label>
          <div class="playlist-name-row">
            <span class="playlist-name-prefix">AI Mix:</span>
            <input type="text" id="playlist-name-input" placeholder="your name here" maxlength="80" />
          </div>
        </div>
        <button id="btn-save" class="btn btn-spotify">Save to Spotify</button>
        <button id="btn-regenerate" class="btn btn-ghost">Regenerate</button>
        <button id="btn-another" class="btn btn-ghost">Start over</button>
      </div>

      <!-- SUCCESS STATE -->
      <div id="section-success" class="hidden result-card">
        <p class="result-label">Playlist created!</p>
        <p id="result-name" class="result-name"></p>
        <p id="result-count" class="result-count"></p>
        <a id="result-link" href="#" target="_blank" rel="noopener" class="btn btn-outline">
          Open in Spotify
        </a>
        <button id="btn-make-another" class="btn btn-ghost">Make another</button>
      </div>

      <!-- ERROR STATE -->
      <div id="section-error" class="hidden error-card">
        <p id="error-message"></p>
        <button id="btn-retry" class="btn btn-ghost">Try again</button>
      </div>

      <button id="btn-logout" class="btn btn-ghost btn-logout">Logout</button>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
